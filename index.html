<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テクノス三原株式会社 | Test Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #001f54; /* 落ち着いたネイビー */
            --accent-color: #0056b3;
            --bg-color: #ffffff;
            --text-color: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary-color);
            letter-spacing: 0.05em;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .hero-content {
            max-width: 800px;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--primary-color);
            letter-spacing: 0.1em;
        }

        .tagline {
            font-size: 1.2rem;
            font-weight: 300;
            color: #555;
            margin-bottom: 40px;
            border-top: 1px solid var(--primary-color);
            display: inline-block;
            padding-top: 10px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--primary-color);
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
            font-weight: 500;
        }

        .btn:hover {
            background-color: var(--accent-color);
        }

        footer {
            padding: 30px;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
            background-color: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            header { padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">TECHNOS MIHARA</div>
    </header>

    <main>
        <div class="hero-content">
            <h1>テクノス三原株式会社</h1>
            <p class="tagline">Technological Solutions for Safety and Quality</p>
            <br>
            <a href="#" class="btn">Learn More</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 テクノス三原株式会社. All Rights Reserved.</p>
        <p>Mihara, Hiroshima, Japan</p>
    </footer>

</body>
</html>
